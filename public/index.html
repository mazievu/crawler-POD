<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apify Collector — Product Intelligence</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== Top Bar ===== -->
  <nav class="topbar">
    <div class="topbar-inner">
      <div class="topbar-left">
        <i data-feather="database" class="topbar-icon"></i>
        <span class="topbar-title">Apify Collector</span>
        <span class="topbar-badge" id="stat-total">0 items</span>
      </div>
      <div class="topbar-right">
        <button class="btn-topbar" onclick="showHistoryModal()">
          <i data-feather="list"></i> Jobs History
        </button>
        <button class="btn-topbar" onclick="showCollectModal()">
          <i data-feather="plus-circle"></i> Collect
        </button>
        <button class="btn-topbar" onclick="exportAll()">
          <i data-feather="download"></i> Export
        </button>
      </div>
    </div>
  </nav>

  <!-- ===== Filters Bar ===== -->
  <div class="filters-bar">
    <div class="filters-inner">
      <!-- Search -->
      <div class="filter-search">
        <i data-feather="search" class="filter-icon"></i>
        <input type="text" id="search-input" placeholder="Search products, brands, keywords..." class="filter-input">
      </div>

      <!-- Platform pills -->
      <div class="filter-pills" id="filter-pills">
        <button class="pill active" data-filter="all" onclick="filterByPlatform('all', this)">
          <span class="pill-dot" style="background:#666"></span> All
        </button>
      </div>

      <!-- Sort -->
      <div class="filter-sort">
        <select id="sort-select" class="filter-select" onchange="applyFilters()">
          <option value="recent">Most Recent</option>
          <option value="likes-desc">Most Liked</option>
          <option value="comments-desc">Most Commented</option>
          <option value="shares-desc">Most Shared</option>
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
          <option value="growth">Most Growth</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ===== Items Grid ===== -->
  <div class="content-area">
    <div class="items-grid" id="items-grid">
      <div class="empty-state">
        <i data-feather="inbox" style="width:48px;height:48px" class="mb-2"></i>
        <p>No items yet. Click <strong>Collect</strong> to start gathering data.</p>
      </div>
    </div>
  </div>

  <!-- ===== Collect Modal ===== -->
  <div class="modal fade" id="collect-modal" tabindex="-1">
    <div class="modal-dialog modal-md">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold">
            <i data-feather="plus-circle" class="me-2 text-primary"></i>Collect Data
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <!-- Platform selector -->
          <div class="mb-3">
            <label class="filter-label">Platform</label>
            <div class="platform-grid" id="platform-grid"></div>
          </div>
          <!-- Query -->
          <div class="mb-3">
            <label class="filter-label">Search Query</label>
            <input type="text" class="form-control" id="collect-query" placeholder="keyword or URL...">
            <small class="text-muted" id="collect-hint"></small>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="filter-label">Max Items</label>
              <input type="number" class="form-control" id="collect-max" value="20" min="1" max="500">
            </div>
            <div class="col-6">
              <label class="filter-label">Country</label>
              <select class="form-select" id="collect-country">
                <option value="">All</option>
                <option value="US">US</option>
                <option value="GB">UK</option>
                <option value="VN">Vietnam</option>
                <option value="JP">Japan</option>
                <option value="KR">Korea</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer border-0">
          <div class="flex-grow-1" id="collect-status"></div>
          <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary btn-sm" id="collect-start" disabled onclick="startCollect()">
            <span class="btn-text"><i data-feather="play" class="me-1" style="width:14px"></i>Start</span>
            <span class="btn-loading spinner-border spinner-border-sm d-none"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Item Detail Modal ===== -->
  <div class="modal fade" id="item-modal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold" id="item-modal-title"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="item-modal-body"></div>
      </div>
    </div>
  </div>

  <!-- ===== Jobs History Modal ===== -->
  <div class="modal fade" id="jobs-modal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold">
            <i data-feather="list" class="me-2 text-primary"></i>Jobs History
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="table-responsive">
            <table class="table table-hover table-sm align-middle fs-13">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Platform</th>
                  <th>Query</th>
                  <th>Status</th>
                  <th>Items</th>
                  <th>Date</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="jobs-tbody">
                <tr><td colspan="7" class="text-center py-4">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
